<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Dorado - Paradise Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0806;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        .ui-overlay {
            position: fixed;
            z-index: 100;
            pointer-events: none;
        }
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .title h1 {
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 50%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(255, 180, 0, 0.5)) drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            letter-spacing: 0.4em;
            font-weight: 400;
            text-indent: 0.4em;
        }
        .title p {
            color: rgba(255, 220, 150, 0.75);
            font-size: 1.1rem;
            margin-top: 12px;
            letter-spacing: 0.35em;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .controls-hint {
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.5);
            font-size: 0.85rem;
            text-align: center;
            letter-spacing: 0.15em;
        }
        .stats-panel {
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, rgba(30, 20, 10, 0.85) 0%, rgba(20, 15, 8, 0.9) 100%);
            padding: 20px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 180, 50, 0.25);
            backdrop-filter: blur(10px);
        }
        .stats-panel h3 {
            color: #ffd700;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            margin-bottom: 12px;
            font-weight: 400;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 8px 0;
            color: rgba(255, 230, 180, 0.8);
            font-size: 0.85rem;
        }
        .stat-value {
            color: #ffb347;
            font-weight: 600;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1208 0%, #0a0604 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1.5s ease-out, visibility 1.5s;
        }
        .loading.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .loading-golden {
            width: 80px;
            height: 80px;
            border: 3px solid transparent;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }
        .loading-golden::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 3px solid transparent;
            border-top-color: #ff8c00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #ffd700;
            font-size: 1.4rem;
            margin-top: 25px;
            letter-spacing: 0.3em;
            animation: shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 170, 50, 0.15) 0%, transparent 70%);
            pointer-events: none;
            top: -200px;
            right: -200px;
            z-index: 1;
            animation: pulseGlow 4s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-golden"></div>
        <div class="loading-text">DISCOVERING EL DORADO</div>
    </div>
    
    <div class="ambient-glow"></div>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay title">
        <h1>EL DORADO</h1>
        <p>The Gilded Paradise</p>
    </div>
    
    <div class="ui-overlay stats-panel">
        <h3>LEGENDARY REALM</h3>
        <div class="stat-item"><span>Golden Temples</span><span class="stat-value">Active</span></div>
        <div class="stat-item"><span>Sacred Waters</span><span class="stat-value">Flowing</span></div>
        <div class="stat-item"><span>Divine Light</span><span class="stat-value">Radiant</span></div>
    </div>
    
    <div class="ui-overlay controls-hint">
        Drag to explore the realm | Scroll to journey closer or farther
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Initialize core components
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(
            55,
            window.innerWidth / window.innerHeight,
            0.1,
            500
        );
        camera.position.set(30, 18, 40);

        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        container.appendChild(renderer.domElement);

        // Camera controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.maxPolarAngle = Math.PI / 2.15;
        controls.minDistance = 18;
        controls.maxDistance = 90;
        controls.target.set(0, 4, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;

        // Atmospheric fog
        scene.fog = new THREE.FogExp2(0x2a1810, 0.008);
        scene.background = new THREE.Color(0x12100c);

        // === LIGHTING SYSTEM ===
        const ambientLight = new THREE.AmbientLight(0xffe4c4, 0.35);
        scene.add(ambientLight);

        // Primary sun light
        const sunLight = new THREE.DirectionalLight(0xffcc66, 2.5);
        sunLight.position.set(60, 70, 40);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 10;
        sunLight.shadow.camera.far = 250;
        sunLight.shadow.camera.left = -60;
        sunLight.shadow.camera.right = 60;
        sunLight.shadow.camera.top = 60;
        sunLight.shadow.camera.bottom = -60;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        // Fill light from opposite direction
        const fillLight = new THREE.DirectionalLight(0x4488cc, 0.35);
        fillLight.position.set(-40, 25, -30);
        scene.add(fillLight);

        // Rim/accent lights
        const rimLight1 = new THREE.PointLight(0xff6600, 1.5, 80);
        rimLight1.position.set(-25, 12, 25);
        scene.add(rimLight1);

        const rimLight2 = new THREE.PointLight(0xffaa00, 1, 60);
        rimLight2.position.set(30, 8, -20);
        scene.add(rimLight2);

        // Hemisphere light for natural sky/ground gradient
        const hemiLight = new THREE.HemisphereLight(0xffeedd, 0x225522, 0.4);
        scene.add(hemiLight);

        // === MATERIALS ===
        const goldMaterial = new THREE.MeshStandardMaterial({
            color: 0xffd700,
            metalness: 0.92,
            roughness: 0.18,
            emissive: 0xcc7700,
            emissiveIntensity: 0.12
        });

        const brightGoldMaterial = new THREE.MeshStandardMaterial({
            color: 0xffec80,
            metalness: 0.95,
            roughness: 0.12,
            emissive: 0xdd9922,
            emissiveIntensity: 0.18
        });

        const darkGoldMaterial = new THREE.MeshStandardMaterial({
            color: 0xb8860b,
            metalness: 0.85,
            roughness: 0.35,
            emissive: 0x663300,
            emissiveIntensity: 0.06
        });

        const stoneMaterial = new THREE.MeshStandardMaterial({
            color: 0x7a6548,
            metalness: 0.05,
            roughness: 0.92
        });

        const darkStoneMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a3d2e,
            metalness: 0.02,
            roughness: 0.95
        });

        const jungleGrassMaterial = new THREE.MeshStandardMaterial({
            color: 0x2d6b27,
            metalness: 0,
            roughness: 0.88
        });

        const waterMaterial = new THREE.MeshStandardMaterial({
            color: 0x1eb5ad,
            metalness: 0.4,
            roughness: 0.08,
            transparent: true,
            opacity: 0.82,
            emissive: 0x114444,
            emissiveIntensity: 0.15
        });

        // === TERRAIN ===
        function createTerrain() {
            const geometry = new THREE.PlaneGeometry(140, 140, 100, 100);
            const positions = geometry.attributes.position.array;
            const colors = new Float32Array(positions.length);
            
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const y = positions[i + 1];
                
                // Multi-octave noise for organic terrain
                let height = 
                    Math.sin(x * 0.04) * Math.cos(y * 0.04) * 4 +
                    Math.sin(x * 0.09 + 1.5) * Math.cos(y * 0.07 + 0.8) * 2 +
                    Math.sin(x * 0.18 + y * 0.15) * 0.8 +
                    Math.pow(Math.random(), 3) * 0.6;
                
                // Create flat area for central city
                const distFromCenter = Math.sqrt(x * x + y * y);
                if (distFromCenter < 22) {
                    const falloff = Math.pow(distFromCenter / 22, 2);
                    height = height * falloff * 0.3;
                }
                
                // Lake depression
                const lakeDist = Math.sqrt(Math.pow(x + 20, 2) + Math.pow(y - 10, 2));
                if (lakeDist < 14) {
                    height = Math.min(height, -1 - (14 - lakeDist) * 0.3);
                }
                
                positions[i + 2] = height;
                
                // Vertex colors based on height
                const normalizedHeight = (height + 2) / 8;
                colors[i] = 0.15 + normalizedHeight * 0.1;
                colors[i + 1] = 0.35 + normalizedHeight * 0.15;
                colors[i + 2] = 0.12 + normalizedHeight * 0.05;
            }
            
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.computeVertexNormals();
            
            const terrain = new THREE.Mesh(geometry, jungleGrassMaterial);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            return terrain;
        }

        scene.add(createTerrain());

        // === CENTRAL GOLDEN TEMPLE ===
        function createMainTemple() {
            const group = new THREE.Group();
            
            // Grand platform base
            const platformGeo = new THREE.BoxGeometry(22, 2.5, 22);
            const platform = new THREE.Mesh(platformGeo, darkStoneMaterial);
            platform.position.y = 1.25;
            platform.receiveShadow = true;
            platform.castShadow = true;
            group.add(platform);
            
            // Stepped foundation
            for (let i = 0; i < 5; i++) {
                const stepGeo = new THREE.BoxGeometry(24 - i * 1.5, 0.6, 24 - i * 1.5);
                const step = new THREE.Mesh(stepGeo, stoneMaterial);
                step.position.y = i * 0.6 + 0.3;
                step.receiveShadow = true;
                step.castShadow = true;
                group.add(step);
            }
            
            // Main pyramid body
            const pyramidGeo = new THREE.ConeGeometry(9, 14, 4);
            const pyramid = new THREE.Mesh(pyramidGeo, goldMaterial);
            pyramid.position.y = 9.5;
            pyramid.rotation.y = Math.PI / 4;
            pyramid.castShadow = true;
            group.add(pyramid);
            
            // Second tier
            const tier2Geo = new THREE.ConeGeometry(6, 9, 4);
            const tier2 = new THREE.Mesh(tier2Geo, brightGoldMaterial);
            tier2.position.y = 16.5;
            tier2.rotation.y = Math.PI / 4;
            tier2.castShadow = true;
            group.add(tier2);
            
            // Third tier
            const tier3Geo = new THREE.ConeGeometry(3.5, 5, 4);
            const tier3 = new THREE.Mesh(tier3Geo, goldMaterial);
            tier3.position.y = 21.5;
            tier3.rotation.y = Math.PI / 4;
            tier3.castShadow = true;
            group.add(tier3);
            
            // Crown spire
            const spireGeo = new THREE.ConeGeometry(1.2, 5, 8);
            const spire = new THREE.Mesh(spireGeo, brightGoldMaterial);
            spire.position.y = 26;
            spire.castShadow = true;
            group.add(spire);
            
            // Orb at apex
            const orbGeo = new THREE.SphereGeometry(0.8, 16, 16);
            const orb = new THREE.Mesh(orbGeo, brightGoldMaterial);
            orb.position.y = 29;
            group.add(orb);
            
            // Ornate pillars around base
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const radius = 10.5;
                
                // Pillar shaft
                const pillarGeo = new THREE.CylinderGeometry(0.35, 0.45, 5, 12);
                const pillar = new THREE.Mesh(pillarGeo, goldMaterial);
                pillar.position.x = Math.cos(angle) * radius;
                pillar.position.z = Math.sin(angle) * radius;
                pillar.position.y = 4;
                pillar.castShadow = true;
                group.add(pillar);
                
                // Pillar capital
                const capitalGeo = new THREE.SphereGeometry(0.6, 12, 12);
                const capital = new THREE.Mesh(capitalGeo, brightGoldMaterial);
                capital.position.copy(pillar.position);
                capital.position.y += 3;
                group.add(capital);
            }
            
            // Staircase leading up
            for (let s = 0; s < 15; s++) {
                const stairGeo = new THREE.BoxGeometry(3, 0.35, 1);
                const stair = new THREE.Mesh(stairGeo, stoneMaterial);
                stair.position.set(0, s * 0.35 + 0.17, 12 + s * 0.8);
                stair.receiveShadow = true;
                group.add(stair);
            }
            
            return group;
        }

        const mainTemple = createMainTemple();
        scene.add(mainTemple);

        // === SACRED LAKE ===
        function createSacredLake() {
            const group = new THREE.Group();
            
            // Water surface
            const waterGeo = new THREE.CircleGeometry(13, 64);
            const water = new THREE.Mesh(waterGeo, waterMaterial);
            water.rotation.x = -Math.PI / 2;
            water.position.y = 0.2;
            group.add(water);
            
            // Golden ring around lake
            const ringGeo = new THREE.TorusGeometry(13.5, 0.8, 8, 48);
            const ring = new THREE.Mesh(ringGeo, goldMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.5;
            ring.castShadow = true;
            group.add(ring);
            
            group.position.set(-20, 0, 10);
            return group;
        }

        const sacredLake = createSacredLake();
        scene.add(sacredLake);

        // === JUNGLE TREES ===
        function createJungleTree(x, z, scale = 1) {
            const group = new THREE.Group();
            
            // Trunk
            const trunkHeight = (4 + Math.random() * 3) * scale;
            const trunkGeo = new THREE.CylinderGeometry(
                0.25 * scale, 
                0.5 * scale, 
                trunkHeight, 
                8
            );
            const trunkMat = new THREE.MeshStandardMaterial({ 
                color: 0x3d2817,
                roughness: 0.95 
            });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = trunkHeight / 2;
            trunk.castShadow = true;
            group.add(trunk);
            
            // Multi-layered canopy
            const canopyColors = [0x1a6b1a, 0x228b22, 0x2e8b2e, 0x3cb371];
            const layers = 3 + Math.floor(Math.random() * 2);
            
            for (let i = 0; i < layers; i++) {
                const layerRadius = (3 - i * 0.5 + Math.random()) * scale;
                const layerHeight = (2.5 - i * 0.3) * scale;
                const canopyGeo = new THREE.ConeGeometry(layerRadius, layerHeight, 8);
                const canopyMat = new THREE.MeshStandardMaterial({
                    color: canopyColors[i % canopyColors.length],
                    roughness: 0.85
                });
                const canopy = new THREE.Mesh(canopyGeo, canopyMat);
                canopy.position.y = trunkHeight + i * (layerHeight * 0.5);
                canopy.rotation.y = Math.random() * Math.PI;
                canopy.castShadow = true;
                group.add(canopy);
            }
            
            group.position.set(x, 0, z);
            group.userData.swayPhase = Math.random() * Math.PI * 2;
            group.userData.swayRate = 0.4 + Math.random() * 0.4;
            group.userData.originalY = 0;
            
            return group;
        }

        const trees = [];
        const treeLocations = [
            [18, 12], [-10, -18], [22, -10], [-28, -8], [14, -22],
            [-18, 22], [28, 22], [-34, 15], [22, 30], [-12, 30],
            [35, 5], [-38, -18], [10, -30], [-24, -30], [38, 15],
            [-35, -28], [32, -25], [-8, 35], [42, -5], [-42, 5]
        ];

        treeLocations.forEach(([tx, tz]) => {
            const tree = createJungleTree(tx, tz, 0.7 + Math.random() * 0.7);
            trees.push(tree);
            scene.add(tree);
        });

        // === PALM TREES NEAR WATER ===
        function createPalmTree(x, z) {
            const group = new THREE.Group();
            const scale = 0.7 + Math.random() * 0.5;
            
            // Curved trunk using tube
            const curvePoints = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0.4 * scale, 2.5 * scale, 0.15 * scale),
                new THREE.Vector3(1 * scale, 5 * scale, 0.3 * scale),
                new THREE.Vector3(1.4 * scale, 7.5 * scale, 0.4 * scale)
            ];
            const trunkCurve = new THREE.CatmullRomCurve3(curvePoints);
            const trunkGeo = new THREE.TubeGeometry(trunkCurve, 14, 0.18 * scale, 8, false);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.9 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.castShadow = true;
            group.add(trunk);
            
            // Palm fronds
            const frondCount = 8;
            for (let f = 0; f < frondCount; f++) {
                const frondGroup = new THREE.Group();
                
                const frondShape = new THREE.Shape();
                frondShape.moveTo(0, 0);
                frondShape.lineTo(3.5 * scale, 0);
                frondShape.lineTo(3.2 * scale, 0.15 * scale);
                frondShape.lineTo(0, 0.25 * scale);
                
                const frondGeo = new THREE.ShapeGeometry(frondShape);
                const frondMat = new THREE.MeshStandardMaterial({
                    color: 0x2d8b2d,
                    side: THREE.DoubleSide,
                    roughness: 0.8
                });
                const frond = new THREE.Mesh(frondGeo, frondMat);
                frondGroup.add(frond);
                
                // Position at top of trunk
                frondGroup.position.copy(curvePoints[3]);
                frondGroup.rotation.z = (f / frondCount) * Math.PI * 2;
                frondGroup.rotation.x = -0.4 - Math.random() * 0.35;
                frondGroup.rotation.y = Math.random() * 0.3;
                
                group.add(frondGroup);
            }
            
            // Coconuts
            for (let c = 0; c < 3; c++) {
                const coconutGeo = new THREE.SphereGeometry(0.2 * scale, 8, 8);
                const coconutMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
                const coconut = new THREE.Mesh(coconutGeo, coconutMat);
                coconut.position.copy(curvePoints[3]);
                coconut.position.x += (Math.random() - 0.5) * 0.3;
                coconut.position.y -= 0.3;
                coconut.position.z += (Math.random() - 0.5) * 0.3;
                group.add(coconut);
            }
            
            group.position.set(x, 0, z);
            return group;
        }

        const palmLocations = [
            [-30, 4], [-16, 20], [-30, 16], [-8, 4], [-32, 22]
        ];
        palmLocations.forEach(([px, pz]) => {
            scene.add(createPalmTree(px, pz));
        });

        // === SMALLER TEMPLE STRUCTURES ===
        function createShrine(x, z, rotY = 0) {
            const group = new THREE.Group();
            
            // Foundation
            const foundGeo = new THREE.BoxGeometry(5, 0.6, 5);
            const found = new THREE.Mesh(foundGeo, darkStoneMaterial);
            found.position.y = 0.3;
            found.receiveShadow = true;
            group.add(found);
            
            // Chamber walls
            const wallGeo = new THREE.BoxGeometry(4, 3.5, 4);
            const chamber = new THREE.Mesh(wallGeo, stoneMaterial);
            chamber.position.y = 2.35;
            chamber.castShadow = true;
            group.add(chamber);
            
            // Golden facade
            const facadeGeo = new THREE.BoxGeometry(4.2, 2.5, 0.3);
            const facade = new THREE.Mesh(facadeGeo, goldMaterial);
            facade.position.set(0, 2.8, 2);
            facade.castShadow = true;
            group.add(facade);
            
            // Roof
            const roofGeo = new THREE.ConeGeometry(3.5, 2.5, 4);
            const roof = new THREE.Mesh(roofGeo, darkGoldMaterial);
            roof.position.y = 5.1;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            group.add(roof);
            
            // Finial
            const finialGeo = new THREE.SphereGeometry(0.4, 12, 12);
            const finial = new THREE.Mesh(finialGeo, brightGoldMaterial);
            finial.position.y = 6.6;
            group.add(finial);
            
            group.position.set(x, 0, z);
            group.rotation.y = rotY;
            return group;
        }

        scene.add(createShrine(18, -8, 0.6));
        scene.add(createShrine(-14, 15, -0.4));
        scene.add(createShrine(25, 18, 1.2));

        // === GOLDEN STATUES ===
        function createGoldenStatue(x, z, scale = 1) {
            const group = new THREE.Group();
            
            // Pedestal
            const pedGeo = new THREE.CylinderGeometry(0.9 * scale, 1.1 * scale, 1.8 * scale, 12);
            const ped = new THREE.Mesh(pedGeo, stoneMaterial);
            ped.position.y = 0.9 * scale;
            ped.castShadow = true;
            ped.receiveShadow = true;
            group.add(ped);
            
            // Pedestal base ring
            const baseRingGeo = new THREE.TorusGeometry(1.2 * scale, 0.15 * scale, 8, 24);
            const baseRing = new THREE.Mesh(baseRingGeo, goldMaterial);
            baseRing.rotation.x = Math.PI / 2;
            baseRing.position.y = 0.1 * scale;
            group.add(baseRing);
            
            // Figure body
            const bodyGeo = new THREE.CapsuleGeometry(0.45 * scale, 2.2 * scale, 12, 20);
            const body = new THREE.Mesh(bodyGeo, goldMaterial);
            body.position.y = 2.9 * scale;
            body.castShadow = true;
            group.add(body);
            
            // Head
            const headGeo = new THREE.SphereGeometry(0.4 * scale, 16, 16);
            const head = new THREE.Mesh(headGeo, brightGoldMaterial);
            head.position.y = 4.4 * scale;
            head.castShadow = true;
            group.add(head);
            
            // Headdress/crown
            const crownGeo = new THREE.ConeGeometry(0.5 * scale, 0.8 * scale, 8);
            const crown = new THREE.Mesh(crownGeo, brightGoldMaterial);
            crown.position.y = 5 * scale;
            crown.castShadow = true;
            group.add(crown);
            
            // Arms
            const armGeo = new THREE.CapsuleGeometry(0.12 * scale, 0.9 * scale, 8, 12);
            const leftArm = new THREE.Mesh(armGeo, goldMaterial);
            leftArm.position.set(-0.6 * scale, 3.2 * scale, 0);
            leftArm.rotation.z = 0.4;
            leftArm.castShadow = true;
            group.add(leftArm);
            
            const rightArm = new THREE.Mesh(armGeo, goldMaterial);
            rightArm.position.set(0.6 * scale, 3.2 * scale, 0);
            rightArm.rotation.z = -0.4;
            rightArm.castShadow = true;
            group.add(rightArm);
            
            group.position.set(x, 0, z);
            group.rotation.y = Math.random() * Math.PI * 2;
            return group;
        }

        scene.add(createGoldenStatue(12, 10, 1.1));
        scene.add(createGoldenStatue(-10, -10, 0.95));
        scene.add(createGoldenStatue(8, -15, 0.85));

        // === WATERFALL ===
        function createWaterfallSystem() {
            const group = new THREE.Group();
            
            // Cliff rocks
            for (let r = 0; r < 12; r++) {
                const rockGeo = new THREE.DodecahedronGeometry(1.5 + Math.random() * 2.5, 1);
                const rockMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(0.08, 0.15, 0.2 + Math.random() * 0.15),
                    roughness: 0.95
                });
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(
                    (Math.random() - 0.5) * 6,
                    Math.random() * 8,
                    (Math.random() - 0.5) * 6
                );
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.scale.y = 0.5 + Math.random() * 0.5;
                rock.castShadow = true;
                rock.receiveShadow = true;
                group.add(rock);
            }
            
            // Waterfall particles
            const particleCount = 350;
            const wfGeometry = new THREE.BufferGeometry();
            const wfPositions = new Float32Array(particleCount * 3);
            const wfSizes = new Float32Array(particleCount);
            const wfAlphas = new Float32Array(particleCount);
            
            for (let i = 0; i < particleCount; i++) {
                resetWaterfallParticle(wfPositions, wfSizes, wfAlphas, i);
            }
            
            wfGeometry.setAttribute('position', new THREE.BufferAttribute(wfPositions, 3));
            wfGeometry.setAttribute('aSize', new THREE.BufferAttribute(wfSizes, 1));
            wfGeometry.setAttribute('aAlpha', new THREE.BufferAttribute(wfAlphas, 1));
            
            const wfMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 }
                },
                vertexShader: `
                    attribute float aSize;
                    attribute float aAlpha;
                    varying float vAlpha;
                    
                    void main() {
                        vAlpha = aAlpha;
                        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = aSize * (280.0 / -mvPos.z);
                        gl_Position = projectionMatrix * mvPos;
                    }
                `,
                fragmentShader: `
                    varying float vAlpha;
                    
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        if (d > 0.5) discard;
                        float glow = pow(1.0 - d * 2.0, 2.0);
                        gl_FragColor = vec4(0.7, 0.92, 1.0, glow * vAlpha * 0.75);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const waterfallParticles = new THREE.Points(wfGeometry, wfMaterial);
            waterfallParticles.userData.isWaterfall = true;
            group.add(waterfallParticles);
            
            group.position.set(-35, 0, -12);
            return group;
        }

        function resetWaterfallParticle(pos, sizes, alphas, idx) {
            pos[idx * 3] = (Math.random() - 0.5) * 3;
            pos[idx * 3 + 1] = 14 + Math.random() * 4;
            pos[idx * 3 + 2] = (Math.random() - 0.5) * 3;
            sizes[idx] = 3 + Math.random() * 5;
            alphas[idx] = 0.5 + Math.random() * 0.5;
        }

        const waterfallSystem = createWaterfallSystem();
        scene.add(waterfallSystem);

        // === GOLDEN PARTICLES (DIVINE DUST) ===
        function createDivineParticles() {
            const count = 600;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const phases = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = Math.random() * 35 + 1;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
                sizes[i] = 0.4 + Math.random() * 0.8;
                phases[i] = Math.random() * Math.PI * 2;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColor1: { value: new THREE.Color(0xffd700) },
                    uColor2: { value: new THREE.Color(0xff8c00) }
                },
                vertexShader: `
                    attribute float aSize;
                    attribute float aPhase;
                    uniform float uTime;
                    varying float vAlpha;
                    varying float vMix;
                    
                    void main() {
                        vec3 pos = position;
                        float t = uTime * 0.4 + aPhase;
                        pos.y += sin(t + position.x * 0.08) * 1.2;
                        pos.x += cos(t * 0.7 + position.z * 0.06) * 0.6;
                        pos.z += sin(t * 0.5 + position.y * 0.05) * 0.4;
                        
                        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = aSize * (320.0 / -mvPos.z);
                        gl_Position = projectionMatrix * mvPos;
                        
                        vAlpha = 0.5 + sin(t * 1.5) * 0.35;
                        vMix = sin(aPhase + uTime * 0.3) * 0.5 + 0.5;
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor1;
                    uniform vec3 uColor2;
                    varying float vAlpha;
                    varying float vMix;
                    
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        if (d > 0.5) discard;
                        
                        float core = 1.0 - smoothstep(0.0, 0.2, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        glow = pow(glow, 1.5);
                        
                        vec3 col = mix(uColor1, uColor2, vMix);
                        float alpha = (core * 0.9 + glow * 0.5) * vAlpha;
                        
                        gl_FragColor = vec4(col, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            return new THREE.Points(geometry, material);
        }

        const divineParticles = createDivineParticles();
        scene.add(divineParticles);

        // === VOLUMETRIC SUN RAYS ===
        function createGodRays() {
            const geometry = new THREE.ConeGeometry(45, 90, 32, 1, true);
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    
                    void main() {
                        vUv = uv;
                        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    
                    float hash(vec2 p) {
                        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                    }
                    
                    void main() {
                        float intensity = 1.0 - vUv.y;
                        intensity *= smoothstep(0.0, 0.25, vUv.y);
                        
                        // Animated ray patterns
                        float rays = 0.0;
                        rays += sin(vWorldPos.x * 0.08 + uTime * 0.4) * 0.5 + 0.5;
                        rays *= sin(vWorldPos.z * 0.06 + uTime * 0.3) * 0.5 + 0.5;
                        rays = pow(rays, 1.5);
                        
                        // Color gradient
                        vec3 warmColor = vec3(1.0, 0.85, 0.5);
                        vec3 hotColor = vec3(1.0, 0.65, 0.25);
                        vec3 color = mix(hotColor, warmColor, rays);
                        
                        float alpha = intensity * 0.12 * (0.4 + rays * 0.6);
                        
                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const rays = new THREE.Mesh(geometry, material);
            rays.position.set(50, 55, 40);
            rays.rotation.x = Math.PI / 2 + 0.25;
            rays.rotation.z = -0.4;
            return rays;
        }

        const godRays = createGodRays();
        scene.add(godRays);

        // === FLOATING LOTUS FLOWERS ON LAKE ===
        function createLotusFlower(x, z) {
            const group = new THREE.Group();
            
            // Petals
            const petalCount = 8;
            for (let p = 0; p < petalCount; p++) {
                const petalGeo = new THREE.SphereGeometry(0.3, 8, 8);
                petalGeo.scale(1, 0.3, 1.5);
                const petalMat = new THREE.MeshStandardMaterial({
                    color: 0xffb6c1,
                    roughness: 0.6,
                    metalness: 0.1
                });
                const petal = new THREE.Mesh(petalGeo, petalMat);
                const angle = (p / petalCount) * Math.PI * 2;
                petal.position.set(Math.cos(angle) * 0.25, 0.1, Math.sin(angle) * 0.25);
                petal.rotation.z = angle;
                petal.rotation.x = -0.3;
                group.add(petal);
            }
            
            // Center
            const centerGeo = new THREE.SphereGeometry(0.2, 12, 12);
            const centerMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                metalness: 0.8,
                roughness: 0.2
            });
            const center = new THREE.Mesh(centerGeo, centerMat);
            center.position.y = 0.15;
            group.add(center);
            
            // Lily pad
            const padGeo = new THREE.CircleGeometry(0.6, 16);
            const padMat = new THREE.MeshStandardMaterial({
                color: 0x228b22,
                side: THREE.DoubleSide,
                roughness: 0.8
            });
            const pad = new THREE.Mesh(padGeo, padMat);
            pad.rotation.x = -Math.PI / 2;
            pad.position.y = -0.05;
            group.add(pad);
            
            group.position.set(x, 0.35, z);
            group.scale.setScalar(0.6 + Math.random() * 0.4);
            group.userData.floatPhase = Math.random() * Math.PI * 2;
            return group;
        }

        const lotusFlowers = [];
        for (let l = 0; l < 6; l++) {
            const angle = (l / 6) * Math.PI * 2;
            const radius = 5 + Math.random() * 6;
            const lx = -20 + Math.cos(angle) * radius;
            const lz = 10 + Math.sin(angle) * radius;
            const lotus = createLotusFlower(lx, lz);
            lotusFlowers.push(lotus);
            scene.add(lotus);
        }

        // === ANIMATION LOOP ===
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = clock.getElapsedTime();
            
            controls.update();
            
            // Update divine particles
            divineParticles.material.uniforms.uTime.value = elapsed;
            const dpPositions = divineParticles.geometry.attributes.position.array;
            for (let i = 0; i < dpPositions.length / 3; i++) {
                dpPositions[i * 3 + 1] += 0.008;
                if (dpPositions[i * 3 + 1] > 36) dpPositions[i * 3 + 1] = 1;
            }
            divineParticles.geometry.attributes.position.needsUpdate = true;
            
            // Update waterfall
            const wfGroup = waterfallSystem.children.find(c => c.userData && c.userData.isWaterfall);
            if (wfGroup) {
                const wfPos = wfGroup.geometry.attributes.position.array;
                const wfSizes = wfGroup.geometry.attributes.aSize.array;
                const wfAlphas = wfGroup.geometry.attributes.aAlpha.array;
                
                for (let i = 0; i < wfAlphas.length; i++) {
                    wfPos[i * 3 + 1] -= 0.18;
                    wfAlphas[i] -= 0.008;
                    
                    if (wfAlphas[i] <= 0 || wfPos[i * 3 + 1] < -2) {
                        resetWaterfallParticle(wfPos, wfSizes, wfAlphas, i);
                    }
                }
                wfGroup.geometry.attributes.position.needsUpdate = true;
                wfGroup.geometry.attributes.aAlpha.needsUpdate = true;
            }
            
            // Tree sway animation
            trees.forEach(tree => {
                const swayAmount = Math.sin(elapsed * tree.userData.swayRate + tree.userData.swayPhase) * 0.025;
                tree.rotation.z = swayAmount;
                tree.rotation.x = swayAmount * 0.6;
            });
            
            // Lotus floating animation
            lotusFlowers.forEach(lotus => {
                const floatY = Math.sin(elapsed * 0.8 + lotus.userData.floatPhase) * 0.08;
                lotus.position.y = 0.35 + floatY;
                lotus.rotation.y = elapsed * 0.2 + lotus.userData.floatPhase;
            });
            
            // Water surface animation
            sacredLake.children[0].position.y = 0.2 + Math.sin(elapsed * 0.6) * 0.08;
            
            // God rays animation
            godRays.material.uniforms.uTime.value = elapsed;
            
            // Pulsing golden materials
            const pulseIntensity = 0.12 + Math.sin(elapsed * 0.6) * 0.06;
            goldMaterial.emissiveIntensity = pulseIntensity;
            brightGoldMaterial.emissiveIntensity = pulseIntensity * 1.5;
            
            // Subtle light movement
            rimLight1.intensity = 1.5 + Math.sin(elapsed * 0.4) * 0.3;
            rimLight2.intensity = 1 + Math.cos(elapsed * 0.35) * 0.25;
            
            renderer.render(scene, camera);
        }

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Hide loading screen after initialization
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 2200);

        animate();
    </script>
</body>
